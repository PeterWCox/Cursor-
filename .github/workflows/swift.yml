# Build Cursor Metro macOS app (Xcode project)
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -project "CursorMetro.xcodeproj" -scheme "CursorMetro" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            clean build

      - name: Upload CursorMetro.app
        uses: actions/upload-artifact@v4
        with:
          name: CursorMetro-macOS
          path: build/Build/Products/Release/CursorMetro.app
